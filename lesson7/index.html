<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="">First name:</label><br>
            <input type="text" id="firstname" name="firstname" disabled<br>
            <label for="lastname">Last name:</label><br>
            <input type="text" name="lastname" id="lastname" readonly><br>
            <label for="email">Email:</label>,<br>
            <input type="email" name="email" id="email"><br>
            <label for="password">Password:</label><br>
            <input type="password" name="password" id="password" placeholder="Password" required><br><br>
            <label>Gender:</label><br>
            <input type="radio" name="Gender" id="male" value="male">
            <label for="male">Male</label><br>
            <input type="radio" name="Gender" id="female" value="female">
            <label for="female">Female</label><br><br>
            <label>Hobbies:</label><br>
            <input type="checkbox" name="gaming" id="gaming" value="Gaming">
            <label for="gaming">Gaming</label><br>
            <input type="checkbox" name="football" id="football" value="Football">
            <label for="football">Football</label><br>
            <input type="checkbox" name="reading" id="reading" value="Reading">
            <label for="reading">Reading</label><br><br>
            <select name="pet" id="pet">
                <option value="dog">Dog</option>
                <option value="cat">Cat</option>
                <option value="perrot">Perrot</option>
            </select><br><br>
            <textarea name="message" rows="10" cols="20" maxlength="50"></textarea><br><br>
            <input type="submit" name="submit" id="submit">  
        </fieldset>
    </form>
</body>
</html>
